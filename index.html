<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Træningslog">
<meta name="theme-color" content="#f7f6f3">
<title>Træningslog</title>
<style>
:root{--bg:#f7f6f3;--card:#fff;--border:#e8e6e1;--text:#1a1917;--muted:#888580;--hint:#c0bcb6;--input-bg:#f2f0ec;--green-bg:#eaf3de;--green-t:#3b6d11;--green-b:#97c459;--blue-bg:#e6f1fb;--blue-t:#0c447c;--amber-bg:#faeeda;--amber-t:#633806;--purple-bg:#eeedfe;--purple-t:#3c3489;--red-bg:#fcebeb;--red-t:#a32d2d;--teal-bg:#e1f5ee;--teal-t:#085041;}
@media(prefers-color-scheme:dark){:root{--bg:#181715;--card:#222018;--border:#2e2c28;--text:#f0ede8;--muted:#7a7670;--hint:#4a4844;--input-bg:#2a2825;--green-bg:#162808;--green-t:#97c459;--green-b:#3b6d11;--blue-bg:#08182e;--blue-t:#85b7eb;--amber-bg:#221505;--amber-t:#fac775;--purple-bg:#141230;--purple-t:#afa9ec;--red-bg:#200a0a;--red-t:#f09595;--teal-bg:#042e1e;--teal-t:#5dcaa5;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px 0;position:sticky;top:0;z-index:20;}
.nav-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.nav-title{font-size:17px;font-weight:700;}
.nav-right{display:flex;gap:6px;align-items:center;}
.icon-btn{background:var(--input-bg);border:none;border-radius:8px;padding:6px 10px;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit;}
.icon-btn.wk{font-weight:700;color:var(--text);cursor:default;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--amber-t);flex-shrink:0;transition:background .3s;}
.sync-dot.ok{background:var(--green-b);}
.sync-dot.err{background:var(--red-t);}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:11px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;font-size:13px;font-weight:500;padding:5px 13px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.tab.fin{border-color:var(--green-b);color:var(--green-t);}
.screen{display:none;padding:16px 16px 32px;}
.screen.visible{display:block;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;}
.stat-l{font-size:11px;color:var(--muted);margin-bottom:3px;}
.stat-v{font-size:21px;font-weight:700;}
.day-intro{margin-bottom:14px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;margin-bottom:5px;}
.day-name{font-size:21px;font-weight:700;}
.day-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:11px;overflow:hidden;}
.ex-head{padding:11px 14px 8px;border-bottom:1px solid var(--border);}
.ex-name{font-size:15px;font-weight:600;}
.ex-target{font-size:12px;color:var(--muted);margin-top:1px;}
.sets-body{padding:10px 14px;}
.sets-lbl{display:grid;grid-template-columns:22px 1fr 1fr 34px;gap:8px;font-size:11px;color:var(--hint);margin-bottom:5px;text-align:center;}
.sets-lbl span:first-child{text-align:left;}
.set-row{display:grid;grid-template-columns:22px 1fr 1fr 34px;gap:8px;align-items:center;margin-bottom:7px;}
.set-n{font-size:12px;color:var(--muted);font-weight:600;}
.set-row input{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:8px 4px;font-size:15px;font-weight:500;text-align:center;color:var(--text);width:100%;font-family:inherit;-webkit-appearance:none;}
.set-row input:focus{outline:2px solid var(--text);border-color:transparent;}
.set-row input:disabled{opacity:.3;}
.chk{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.chk.on{background:var(--green-bg);border-color:var(--green-b);}
.chk.on::after{content:'';display:block;width:9px;height:5px;border-left:2px solid var(--green-t);border-bottom:2px solid var(--green-t);transform:rotate(-45deg) translateY(-1px);}
.note{display:block;width:100%;margin-top:7px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);font-family:inherit;resize:none;}
.note:focus{outline:2px solid var(--text);border-color:transparent;}
.note::placeholder{color:var(--hint);}
.hiit-box{background:var(--amber-bg);border-radius:10px;padding:10px 14px;margin-bottom:11px;font-size:13px;color:var(--amber-t);font-weight:500;}
.fin-area{margin-top:4px;}
.fin-date-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px 14px;}
.fin-date-label{font-size:13px;color:var(--muted);flex-shrink:0;}
.fin-date-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-weight:500;color:var(--text);font-family:inherit;}
.fin-date-input:focus{outline:2px solid var(--text);border-color:transparent;}
.fin-btn{width:100%;padding:14px;border-radius:13px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;}
.fin-btn:active{transform:scale(.98);}
.fin-btn.on{background:var(--green-bg);border-color:var(--green-b);color:var(--green-t);}
.fin-done-info{font-size:12px;color:var(--green-t);text-align:center;margin-top:6px;}
.loading{display:flex;align-items:center;justify-content:center;padding:40px 20px;color:var(--muted);font-size:14px;gap:10px;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--muted);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.section-title{font-size:19px;font-weight:700;margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:14px;}
.body-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.bstat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 11px;}
.bstat-l{font-size:10px;color:var(--muted);margin-bottom:2px;}
.bstat-v{font-size:17px;font-weight:700;}
.bstat-d{font-size:11px;margin-top:1px;}
.delta-neg{color:var(--green-t);}
.delta-pos{color:var(--red-t);}
.delta-neut{color:var(--hint);}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:11px;overflow:hidden;}
.chart-head{padding:11px 14px 4px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.chart-title{font-size:14px;font-weight:600;}
.chart-legend{display:flex;gap:10px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.chart-wrap{padding:8px 14px 14px;}
canvas{display:block;}
.input-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:11px;overflow:hidden;}
.input-card-head{padding:11px 14px 9px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;}
.input-card-body{padding:12px 14px;}
.input-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.input-row:last-child{margin-bottom:0;}
.input-label{font-size:13px;color:var(--muted);width:110px;flex-shrink:0;}
.input-row input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:15px;font-weight:500;color:var(--text);font-family:inherit;-webkit-appearance:none;}
.input-row input:focus{outline:2px solid var(--text);border-color:transparent;}
.input-unit{font-size:13px;color:var(--muted);width:28px;text-align:right;flex-shrink:0;}
.save-btn{width:100%;padding:13px;border-radius:12px;border:1.5px solid var(--border);background:var(--teal-bg);color:var(--teal-t);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:14px;}
.save-btn:active{transform:scale(.98);}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.hist-head{padding:11px 14px 9px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.hist-row:last-child{border-bottom:none;}
.hist-week{font-weight:600;color:var(--muted);}
.hist-vals{display:flex;gap:12px;}
.hist-val{display:flex;flex-direction:column;align-items:flex-end;}
.hv-num{font-size:14px;font-weight:600;}
.hv-label{font-size:10px;color:var(--hint);}
.lift-card{background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:11px;overflow:hidden;}
.lift-title{padding:10px 14px 8px;font-size:14px;font-weight:600;border-bottom:1px solid var(--border);}
.lift-rows{padding:6px 14px 10px;}
.lift-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
.lift-row:last-child{border-bottom:none;}
.lift-date{color:var(--muted);}
.lift-val{font-weight:600;}
.lift-vol{font-size:11px;color:var(--hint);margin-left:5px;}
.pr-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:999px;background:var(--amber-bg);color:var(--amber-t);margin-left:5px;}
.no-data{font-size:13px;color:var(--hint);text-align:center;padding:18px 0;}
.export-box{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px;font-size:11px;font-family:monospace;color:var(--muted);white-space:pre-wrap;word-break:break-all;max-height:220px;overflow-y:auto;margin-bottom:11px;}
.copy-btn{width:100%;padding:13px;border-radius:12px;border:1.5px solid var(--border);background:var(--blue-bg);color:var(--blue-t);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:8px;}
.copy-btn:active{transform:scale(.98);}
.clear-btn{width:100%;padding:13px;border-radius:12px;border:1.5px solid var(--border);background:var(--red-bg);color:var(--red-t);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;}

/* ── KOST ─────────────────────────────────────────────────── */
.kost-date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.kost-date-label{font-size:16px;font-weight:700;}
.kost-rings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kost-ring-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.ring-wrap{position:relative;width:80px;height:80px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-val{font-size:15px;font-weight:700;line-height:1;}
.ring-unit{font-size:9px;color:var(--muted);}
.ring-label{font-size:12px;font-weight:600;color:var(--text);}
.ring-sub{font-size:11px;color:var(--muted);}
.balance-card{border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.balance-card.deficit{background:var(--green-bg);border:1px solid var(--green-b);}
.balance-card.surplus{background:var(--red-bg);border:1px solid var(--red-t);}
.balance-card.neutral{background:var(--input-bg);border:1px solid var(--border);}
.balance-label{font-size:13px;font-weight:500;}
.balance-label.deficit{color:var(--green-t);}
.balance-label.surplus{color:var(--red-t);}
.balance-label.neutral{color:var(--muted);}
.balance-val{font-size:22px;font-weight:700;}
.balance-val.deficit{color:var(--green-t);}
.balance-val.surplus{color:var(--red-t);}
.balance-val.neutral{color:var(--muted);}
.kost-input-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:11px;overflow:hidden;}
.kost-input-head{padding:11px 14px 9px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;}
.kost-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.kost-field{padding:10px 14px;border-bottom:1px solid var(--border);}
.kost-field:nth-child(odd){border-right:1px solid var(--border);}
.kost-field:nth-last-child(-n+2){border-bottom:none;}
.kost-field-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.kost-field input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:15px;font-weight:500;color:var(--text);font-family:inherit;-webkit-appearance:none;}
.kost-field input:focus{outline:2px solid var(--text);border-color:transparent;}
.kost-save-btn{width:100%;padding:13px;border-radius:12px;border:1.5px solid var(--border);background:var(--teal-bg);color:var(--teal-t);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:14px;}
.kost-save-btn:active{transform:scale(.98);}
.week-kost-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:11px;}
.week-kost-head{padding:11px 14px 9px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;}
.week-kost-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.week-kost-row:last-child{border-bottom:none;}
.wkr-day{color:var(--muted);font-weight:500;width:40px;}
.wkr-vals{display:flex;gap:10px;align-items:center;}
.wkr-kcal{font-weight:600;}
.wkr-bal{font-size:11px;padding:2px 7px;border-radius:999px;}
.wkr-bal.def{background:var(--green-bg);color:var(--green-t);}
.wkr-bal.sur{background:var(--red-bg);color:var(--red-t);}
.wkr-prot{font-size:11px;color:var(--muted);}

.bottom-nav{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0 env(safe-area-inset-bottom,16px);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0;font-family:inherit;}
.bnav-icon{font-size:19px;}
.bnav-label{font-size:10px;color:var(--muted);}
.bnav-btn.active .bnav-label{color:var(--text);font-weight:600;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-top">
    <span class="nav-title" id="navTitle">Træningslog</span>
    <div class="nav-right" id="navRight">
      <div class="sync-dot" id="syncDot"></div>
      <button class="icon-btn" onclick="changeWeek(-1)">◀</button>
      <span class="icon-btn wk" id="weekLabel">Uge 1</span>
      <button class="icon-btn" onclick="changeWeek(1)">▶</button>
    </div>
  </div>
  <div class="tabs" id="tabs"><div style="padding:8px 0 11px;color:var(--muted);font-size:13px;">Henter...</div></div>
</div>

<div class="screen visible" id="log-screen"><div class="loading"><div class="spinner"></div>Henter træningsdata...</div></div>
<div class="screen" id="body-screen"></div>
<div class="screen" id="prog-screen"></div>
<div class="screen" id="export-screen"></div>
<div class="screen" id="kost-screen"></div>

<div class="bottom-nav">
  <button class="bnav-btn active" onclick="showScreen('log')" id="bnav-log"><span class="bnav-icon">📋</span><span class="bnav-label">Log</span></button>
  <button class="bnav-btn" onclick="showScreen('body')" id="bnav-body"><span class="bnav-icon">⚖️</span><span class="bnav-label">Krop</span></button>
  <button class="bnav-btn" onclick="showScreen('prog')" id="bnav-prog"><span class="bnav-icon">📈</span><span class="bnav-label">Styrke</span></button>
  <button class="bnav-btn" onclick="showScreen('kost')" id="bnav-kost"><span class="bnav-icon">🍽️</span><span class="bnav-label">Kost</span></button>
  <button class="bnav-btn" onclick="showScreen('export')" id="bnav-export"><span class="bnav-icon">📤</span><span class="bnav-label">Eksport</span></button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  {name:'Bænkpres',dayId:'d1',ei:0},{name:'Squat',dayId:'d2',ei:0},
  {name:'Deadlift',dayId:'d4',ei:0},{name:'Shoulder press',dayId:'d1',ei:2},{name:'Barbell row',dayId:'d1',ei:3}

let curDay=0,curWeek=1,curScreen='log';
const charts={};
// In-memory cache: cache[week][dayId] = data object

function lsKey(w,id){return`wlog_w${w}_${id}`;}
function bodyLsKey(w){return`wlog_body_w${w}`;}

function setSync(s){const d=document.getElementById('syncDot');if(d){d.className='sync-dot'+(s==='ok'?' ok':s==='err'?' err':'');}}

async function sb(table,method,body,qs){
  const url=`${SB_URL}/rest/v1/${table}${qs?'?'+qs:''}`;
  const opts={method,headers:{...HDR,Prefer:method==='POST'?'resolution=merge-duplicates,return=minimal':'return=minimal'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  if(method==='GET')return r.json();
  return r.ok;
}

// ── WORKOUT CACHE ──────────────────────────────────────────────
function wcGet(w,id){
  if(WC[w]&&WC[w][id]!==undefined)return WC[w][id];
  const ls=localStorage.getItem(lsKey(w,id));
  if(ls){const d=JSON.parse(ls);if(!WC[w])WC[w]={};WC[w][id]=d;return d;}
  return null;
}
function wcSet(w,id,data){
  if(!WC[w])WC[w]={};
  WC[w][id]=data;
  localStorage.setItem(lsKey(w,id),JSON.stringify(data));
}

// Preload ALL days for a given week from Supabase in ONE request
async function preloadWeek(w){
  try{
    setSync('');
    // Fetch all rows for this week, latest first per day
    const rows=await sb('workout_log','GET',null,`week=eq.${w}&order=day_id.asc,updated_at.desc`);
    if(!WC[w])WC[w]={};
    // Group by day_id — keep only first (= latest) per day
    const seen=new Set();
    (rows||[]).forEach(r=>{
      if(!seen.has(r.day_id)){
        seen.add(r.day_id);
        WC[w][r.day_id]=r.data;
        localStorage.setItem(lsKey(w,r.day_id),JSON.stringify(r.data));
      }
    });
    setSync('ok');
  }catch(e){setSync('err');}
}

async function saveWorkout(w,id,data){
  wcSet(w,id,data);
  setSync('');
  try{await sb('workout_log','POST',{week:w,day_id:id,data});setSync('ok');}
  catch(e){setSync('err');}
}

// ── BODY CACHE ─────────────────────────────────────────────────
const BC={};
function bcGet(w){
  if(BC[w])return BC[w];
  const ls=localStorage.getItem(bodyLsKey(w));
  if(ls){BC[w]=JSON.parse(ls);return BC[w];}
  return null;
}
async function saveBody(w,data){
  BC[w]=data;localStorage.setItem(bodyLsKey(w),JSON.stringify(data));
  setSync('');
  try{await sb('body_log','POST',{week:w,weight:data.weight?parseFloat(data.weight):null,fat:data.fat?parseFloat(data.fat):null,muscle:data.muscle?parseFloat(data.muscle):null,date:data.date});setSync('ok');}
  catch(e){setSync('err');}
}
async function loadBodyRemote(w){
  if(BC[w])return BC[w];
  try{const rows=await sb('body_log','GET',null,`week=eq.${w}&limit=1`);if(rows&&rows.length){const d={weight:rows[0].weight,fat:rows[0].fat,muscle:rows[0].muscle,date:rows[0].date};BC[w]=d;localStorage.setItem(bodyLsKey(w),JSON.stringify(d));return d;}}catch(e){}
  return null;
}
async function loadAllBody(){
  try{
    const rows=await sb('body_log','GET',null,'order=week.asc');
    if(rows&&rows.length){rows.forEach(r=>{const d={weight:r.weight,fat:r.fat,muscle:r.muscle,date:r.date};BC[r.week]=d;localStorage.setItem(bodyLsKey(r.week),JSON.stringify(d));});return rows.map(r=>({week:r.week,...BC[r.week]}));}
  }catch(e){}
  const e=[];for(let w=1;w<=8;w++){const d=bcGet(w);if(d&&(d.weight||d.fat||d.muscle))e.push({week:w,...d});}return e;
}

// ── HELPERS ────────────────────────────────────────────────────
function todayISO(){return new Date().toISOString().split('T')[0];}
function isoToDa(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}
function defaultKg(ex,w){if(ex.bw)return'';if(w===7)return+(ex.kg*.85).toFixed(1);if(w<=2)return ex.kg;if(w<=4)return ex.kg+2.5;if(w<=6)return ex.kg+5;return ex.kg+5;}
function makeInit(di,w){const d=DAYS[di];const r={sets:{},checks:{},notes:{},finished:false,date:null};d.ex.forEach((e,ei)=>{r.sets[ei]=Array.from({length:e.s},()=>({kg:defaultKg(e,w),r:e.r}));r.notes[ei]='';});return r;}
function vol(data,d){let v=0;d.ex.forEach((e,ei)=>{(data.sets[ei]||[]).forEach(s=>{v+=(+s.kg||0)*(+s.r||0);});});return Math.round(v);}
function done(data){return Object.values(data.checks).filter(Boolean).length;}
function total(d){return d.ex.reduce((a,e)=>a+e.s,0);}
function dH(val,inv){if(val==null)return'';const n=+val,s=n>0?'+':'',g=inv?n<0:n>0,c=n===0?'delta-neut':g?'delta-neg':'delta-pos';return`<span class="${c}">${s}${val}</span>`;}

// ── TABS ───────────────────────────────────────────────────────
function renderTabs(){
  document.getElementById('tabs').innerHTML=DAYS.map((day,i)=>{
    const data=wcGet(curWeek,day.id);
    const fin=!!(data&&data.finished);
    let cls='tab'+(i===curDay?' active':'')+(fin?' fin':'');
    return`<button class="${cls}" onclick="switchDay(${i})">${day.short}</button>`;
  }).join('');
  document.getElementById('weekLabel').textContent=`Uge ${curWeek}`;
}

// ── LOG ────────────────────────────────────────────────────────
function renderLog(){
  const d=DAYS[curDay];
  let data=wcGet(curWeek,d.id);
  if(!data){data=makeInit(curDay,curWeek);wcSet(curWeek,d.id,data);}
  const v=vol(data,d),dn=done(data),tot=total(d),fin=data.finished;
  let h=`<div class="stats-row">
    <div class="stat"><div class="stat-l">Sæt klaret</div><div class="stat-v">${dn}/${tot}</div></div>
    <div class="stat"><div class="stat-l">Volumen</div><div class="stat-v">${v.toLocaleString()} kg</div></div>
  </div>
  <div class="day-intro">
    <span class="badge" style="${d.bs}">${d.bt}</span>
    <div class="day-name">${d.title}</div>
    <div class="day-sub">${d.label} · Uge ${curWeek}${curWeek===7?' — Deload':curWeek===8?' — PR-uge':''}</div>
  </div>`;
  d.ex.forEach((ex,ei)=>{
    const rl=ex.rl||'reps';
    h+=`<div class="ex-card"><div class="ex-head"><div class="ex-name">${ex.n}</div><div class="ex-target">${ex.t} reps</div></div>
    <div class="sets-body"><div class="sets-lbl"><span>#</span><span>${ex.bw?'BW':'kg'}</span><span>${rl}</span><span></span></div>`;
    for(let s=0;s<ex.s;s++){
      const key=`${ei}-${s}`;const chk=data.checks[key];
      const sd=(data.sets[ei]||[])[s]||{kg:defaultKg(ex,curWeek),r:ex.r};
      h+=`<div class="set-row"><span class="set-n">${s+1}</span>
        <input type="number" inputmode="decimal" value="${sd.kg}" placeholder="${ex.bw?'BW':'0'}" ${ex.bw?'disabled':''} onchange="setVal(${ei},${s},'kg',this.value)">
        <input type="number" inputmode="numeric" value="${sd.r}" placeholder="0" onchange="setVal(${ei},${s},'r',this.value)">
        <div class="chk${chk?' on':''}" onclick="toggleChk('${key}')"></div></div>`;
    }
    h+=`<textarea class="note" rows="2" placeholder="Note..." onchange="setNote(${ei},this.value)">${data.notes[ei]||''}</textarea></div></div>`;
  });
  if(d.hiit)h+=`<div class="hiit-box">+ 12-3-30 / HIIT efter træning</div>`;
  h+=`<div class="fin-area">`;
  if(!fin){h+=`<div class="fin-date-row"><span class="fin-date-label">Træningsdato</span><input type="date" id="finDate" class="fin-date-input" value="${todayISO()}"></div><button class="fin-btn" onclick="toggleFin()">Marker som færdig</button>`;}
  else{h+=`<button class="fin-btn on" onclick="toggleFin()">Træning fuldført ✓</button><div class="fin-done-info">Logget: ${isoToDa(data.date)}</div>`;}
  h+=`</div>`;
  document.getElementById('log-screen').innerHTML=h;
  renderTabs();
}

function getData(){const d=DAYS[curDay];let data=wcGet(curWeek,d.id);if(!data){data=makeInit(curDay,curWeek);wcSet(curWeek,d.id,data);}return{d,data};}

async function setVal(ei,si,field,val){
  const{d,data}=getData();
  if(data.sets[ei]&&data.sets[ei][si])data.sets[ei][si][field]=val;
  await saveWorkout(curWeek,d.id,data);
  const v=vol(data,d),dn=done(data),tot=total(d);
  const sr=document.querySelector('.stats-row');
  if(sr)sr.innerHTML=`<div class="stat"><div class="stat-l">Sæt klaret</div><div class="stat-v">${dn}/${tot}</div></div><div class="stat"><div class="stat-l">Volumen</div><div class="stat-v">${v.toLocaleString()} kg</div></div>`;
}
async function setNote(ei,val){const{d,data}=getData();data.notes[ei]=val;await saveWorkout(curWeek,d.id,data);}
async function toggleChk(key){const{d,data}=getData();data.checks[key]=!data.checks[key];await saveWorkout(curWeek,d.id,data);renderLog();}
async function toggleFin(){
  const{d,data}=getData();
  if(!data.finished){const di=document.getElementById('finDate');data.finished=true;data.date=di?di.value:todayISO();}
  else{data.finished=false;data.date=null;}
  await saveWorkout(curWeek,d.id,data);renderLog();
}
function switchDay(i){curDay=i;renderLog();}
async function changeWeek(dir){
  const n=curWeek+dir;if(n<1||n>8)return;
  curWeek=n;
  document.getElementById('weekLabel').textContent=`Uge ${curWeek}`;
  document.getElementById('tabs').innerHTML='<div style="padding:8px 0 11px;color:var(--muted);font-size:13px;">Henter...</div>';
  document.getElementById('log-screen').innerHTML='<div class="loading"><div class="spinner"></div>Henter data...</div>';
  await preloadWeek(curWeek);
  renderTabs();
  renderLog();
}

// ── BODY ───────────────────────────────────────────────────────
function drawBodyChart(entries){
  const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=dk?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)',tc=dk?'#7a7670':'#888580';
  if(charts.body){charts.body.destroy();delete charts.body;}
  const ctx=document.getElementById('bodyChart');if(!ctx)return;
  const w=entries.map(e=>e.weight?+e.weight:null),f=entries.map(e=>e.fat?+e.fat:null),m=entries.map(e=>e.muscle?+e.muscle:null);
  const ds=[
    {label:'Vægt',data:w,borderColor:'#378add',backgroundColor:'rgba(55,138,221,0.08)',tension:.4,pointRadius:4,pointBackgroundColor:'#378add',yAxisID:'y'},
    {label:'Fedt %',data:f,borderColor:'#d85a30',backgroundColor:'rgba(216,90,48,0.08)',tension:.4,pointRadius:4,pointBackgroundColor:'#d85a30',yAxisID:'y2'},
  ];
  if(m.some(x=>x!==null))ds.push({label:'Muskler',data:m,borderColor:'#1d9e75',backgroundColor:'rgba(29,158,117,0.08)',tension:.4,pointRadius:4,pointBackgroundColor:'#1d9e75',yAxisID:'y'});
  charts.body=new Chart(ctx,{type:'line',data:{labels:entries.map(e=>`U${e.week}`),datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{position:'left',grid:{color:gc},ticks:{color:tc,font:{size:11}},title:{display:true,text:'kg',color:tc,font:{size:10}}},y2:{position:'right',grid:{drawOnChartArea:false},ticks:{color:tc,font:{size:11}},title:{display:true,text:'%',color:tc,font:{size:10}}}}}});
}

async function renderBody(){
  const entries=await loadAllBody();
  const existing=await loadBodyRemote(curWeek)||{weight:'',fat:'',muscle:''};
  const lat=entries.length?entries[entries.length-1]:null,fst=entries.length?entries[0]:null;
  const wD=lat&&fst&&lat.week!==fst.week?(+lat.weight-+fst.weight).toFixed(1):null;
  const fD=lat&&fst&&lat.week!==fst.week?(+lat.fat-+fst.fat).toFixed(1):null;
  const mD=lat&&fst&&lat.week!==fst.week&&lat.muscle&&fst.muscle?(+lat.muscle-+fst.muscle).toFixed(1):null;
  const sc=entries.length>=2;
  let h=`<div class="section-title">Kropsmåling</div><div class="section-sub">Log data fra PureGym bodytracker</div>`;
  if(entries.length>0)h+=`<div class="body-stats">
    <div class="bstat"><div class="bstat-l">Vægt</div><div class="bstat-v">${lat.weight||'—'} kg</div><div class="bstat-d">${dH(wD,true)}</div></div>
    <div class="bstat"><div class="bstat-l">Fedt %</div><div class="bstat-v">${lat.fat||'—'}%</div><div class="bstat-d">${dH(fD,true)}</div></div>
    <div class="bstat"><div class="bstat-l">Muskler</div><div class="bstat-v">${lat.muscle||'—'} kg</div><div class="bstat-d">${dH(mD,false)}</div></div>
  </div>`;
  if(sc)h+=`<div class="chart-card"><div class="chart-head"><span class="chart-title">Kropskomposition</span><div class="chart-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#378add"></div>Vægt</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d85a30"></div>Fedt %</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1d9e75"></div>Muskler</div>
  </div></div><div class="chart-wrap"><canvas id="bodyChart" style="height:180px;width:100%;"></canvas></div></div>`;
  h+=`<div class="input-card"><div class="input-card-head">Uge ${curWeek} — indtast målinger</div><div class="input-card-body">
    <div class="input-row"><span class="input-label">Vægt</span><input type="number" inputmode="decimal" id="bW" value="${existing.weight||''}" placeholder="93.0"><span class="input-unit">kg</span></div>
    <div class="input-row"><span class="input-label">Fedtprocent</span><input type="number" inputmode="decimal" id="bF" value="${existing.fat||''}" placeholder="23.0"><span class="input-unit">%</span></div>
    <div class="input-row"><span class="input-label">Muskelmasse</span><input type="number" inputmode="decimal" id="bM" value="${existing.muscle||''}" placeholder="0.0"><span class="input-unit">kg</span></div>
  </div></div>
  <button class="save-btn" onclick="saveBodyEntry()">Gem måling for uge ${curWeek}</button>`;
  if(entries.length>0){
    h+=`<div class="hist-card"><div class="hist-head">Historik</div>`;
    [...entries].reverse().forEach((e,i,arr)=>{
      const p=arr[i+1];
      const wDx=p&&e.weight&&p.weight?(+e.weight-+p.weight).toFixed(1):null;
      const fDx=p&&e.fat&&p.fat?(+e.fat-+p.fat).toFixed(1):null;
      const mDx=p&&e.muscle&&p.muscle?(+e.muscle-+p.muscle).toFixed(1):null;
      h+=`<div class="hist-row"><span class="hist-week">Uge ${e.week}${e.date?' · '+e.date:''}</span>
        <div class="hist-vals">
          <div class="hist-val"><span class="hv-num">${e.weight||'—'} kg ${wDx!==null?dH(wDx,true):''}</span><span class="hv-label">Vægt</span></div>
          <div class="hist-val"><span class="hv-num">${e.fat||'—'}% ${fDx!==null?dH(fDx,true):''}</span><span class="hv-label">Fedt</span></div>
          <div class="hist-val"><span class="hv-num">${e.muscle||'—'} kg ${mDx!==null?dH(mDx,false):''}</span><span class="hv-label">Muskler</span></div>
        </div></div>`;
    });h+=`</div>`;
  }
  document.getElementById('body-screen').innerHTML=h;
  if(sc)setTimeout(()=>drawBodyChart(entries),50);
}

async function saveBodyEntry(){
  await saveBody(curWeek,{weight:document.getElementById('bW').value,fat:document.getElementById('bF').value,muscle:document.getElementById('bM').value,date:new Date().toLocaleDateString('da-DK')});
  renderBody();
}

// ── STYRKE ────────────────────────────────────────────────────
async function renderProg(){
  let h=`<div class="section-title">Styrkeudvikling</div><div class="section-sub" style="margin-bottom:14px;">Baseret på færdige træninger</div>`;
  const cids=[];
  for(const[li,lift] of KEY_LIFTS.entries()){
    const entries=[];
    for(let w=1;w<=8;w++){
      let data=wcGet(w,lift.dayId);
      if(!data){try{const rows=await sb('workout_log','GET',null,`week=eq.${w}&day_id=eq.${lift.dayId}&order=updated_at.desc&limit=1`);if(rows&&rows.length){data=rows[0].data;wcSet(w,lift.dayId,data);}}catch(e){}}
      if(!data||!data.finished)continue;
      const sets=(data.sets[lift.ei]||[]);
      const mk=Math.max(...sets.map(s=>+s.kg||0));
      const v=Math.round(sets.reduce((a,s)=>(+s.kg||0)*(+s.r||0)+a,0));
      if(mk>0)entries.push({week:w,kg:mk,vol:v,date:data.date?isoToDa(data.date):''});
    }
    const mk=entries.length?Math.max(...entries.map(e=>e.kg)):0;
    const cid=`lc_${li}`;const sc=entries.length>=2;
    h+=`<div class="lift-card"><div class="lift-title">${lift.name}${mk?` — max ${mk} kg`:''}</div>`;
    if(sc){h+=`<div class="chart-wrap" style="padding:10px 14px;"><canvas id="${cid}" style="height:130px;width:100%;"></canvas></div>`;cids.push({cid,entries});}
    h+=`<div class="lift-rows">`;
    if(!entries.length)h+=`<div class="no-data">Ingen data endnu</div>`;
    else entries.forEach((e,i)=>{
      const pr=e.kg===mk&&i===entries.map(x=>x.kg).lastIndexOf(mk);
      h+=`<div class="lift-row"><span class="lift-date">Uge ${e.week}${e.date?' · '+e.date:''}</span><span><span class="lift-val">${e.kg} kg</span><span class="lift-vol">${e.vol} vol</span>${pr&&entries.length>1?'<span class="pr-badge">PR</span>':''}</span></div>`;
    });
    h+=`</div></div>`;
  }
  document.getElementById('prog-screen').innerHTML=h;
  function dlc(entries,cid){
    const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
    const gc=dk?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)',tc=dk?'#7a7670':'#888580';
    if(charts[cid]){charts[cid].destroy();delete charts[cid];}
    const ctx=document.getElementById(cid);if(!ctx)return;
    charts[cid]=new Chart(ctx,{type:'line',data:{labels:entries.map(e=>`U${e.week}`),datasets:[
      {label:'Kg',data:entries.map(e=>e.kg),borderColor:'#378add',backgroundColor:'rgba(55,138,221,0.1)',tension:.4,pointRadius:4,pointBackgroundColor:'#378add',fill:true,yAxisID:'y'},
      {label:'Vol',data:entries.map(e=>e.vol),borderColor:'#1d9e75',backgroundColor:'rgba(29,158,117,0.06)',tension:.4,pointRadius:3,pointBackgroundColor:'#1d9e75',borderDash:[4,3],yAxisID:'y2'},
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{position:'left',grid:{color:gc},ticks:{color:tc,font:{size:11}},title:{display:true,text:'kg',color:tc,font:{size:10}}},y2:{position:'right',grid:{drawOnChartArea:false},ticks:{color:tc,font:{size:11}},title:{display:true,text:'vol',color:tc,font:{size:10}}}}}});
  }
  setTimeout(()=>cids.forEach(c=>dlc(c.entries,c.cid)),50);
}

// ── EKSPORT ───────────────────────────────────────────────────
async function renderExport(){
  let csv='Uge,Dato,Kategori,Øvelse,Sæt,Kg,Reps\n';let has=false;
  for(let w=1;w<=8;w++){
    for(const d of DAYS){
      let data=wcGet(w,d.id);
      if(!data){try{const rows=await sb('workout_log','GET',null,`week=eq.${w}&day_id=eq.${d.id}&order=updated_at.desc&limit=1`);if(rows&&rows.length){data=rows[0].data;wcSet(w,d.id,data);}}catch(e){}}
      if(!data||!data.finished)continue;has=true;
      const dato=data.date?isoToDa(data.date):'';
      d.ex.forEach((ex,ei)=>{(data.sets[ei]||[]).forEach((s,si)=>{csv+=`${w},${dato},${d.title},${ex.n},${si+1},${s.kg||'BW'},${s.r}\n`;});});
    }
    const b=bcGet(w);
    if(b&&(b.weight||b.fat||b.muscle)){has=true;
      if(b.weight)csv+=`${w},,Krop,Vægt,—,${b.weight},kg\n`;
      if(b.fat)csv+=`${w},,Krop,Fedtprocent,—,${b.fat},%\n`;
      if(b.muscle)csv+=`${w},,Krop,Muskelmasse,—,${b.muscle},kg\n`;
    }
  }
  window._csv=csv;
  document.getElementById('export-screen').innerHTML=`
    <div class="section-title">Eksport</div>
    <div class="section-sub" style="margin-bottom:14px;">Data gemmes i Supabase cloud. Kopiér og send til Claude for analyse.</div>
    <div class="export-box">${has?csv:'Ingen data endnu.'}</div>
    ${has?`<button class="copy-btn" onclick="copyCSV()">Kopiér til udklipsholder</button>`:''}
    <button class="clear-btn" onclick="clearAll()">Slet lokal cache</button>`;
}

function copyCSV(){navigator.clipboard.writeText(window._csv||'').then(()=>{const b=document.querySelector('.copy-btn');if(b){b.textContent='Kopieret ✓';setTimeout(()=>{b.textContent='Kopiér til udklipsholder';},2000);}});}
function clearAll(){
  if(!confirm('Slet lokal cache? Cloud-data i Supabase bevares.'))return;
  for(let w=1;w<=8;w++){DAYS.forEach(d=>localStorage.removeItem(lsKey(w,d.id)));localStorage.removeItem(bodyLsKey(w));}
  Object.keys(WC).forEach(k=>delete WC[k]);Object.keys(BC).forEach(k=>delete BC[k]);
  init();
}

async function showScreen(name){
  curScreen=name;
  ['log','body','prog','export','kost'].forEach(s=>{document.getElementById(s+'-screen').classList.toggle('visible',s===name);document.getElementById('bnav-'+s).classList.toggle('active',s===name);});
  document.getElementById('tabs').style.display=name==='log'?'flex':'none';
  document.getElementById('navRight').style.display=name==='log'?'flex':'none';
  document.getElementById('navTitle').textContent={log:'Træningslog',body:'Krop',prog:'Styrke',export:'Eksport',kost:'Kostlog'}[name];
  if(name==='body')await renderBody();
  if(name==='prog')await renderProg();
  if(name==='export')await renderExport();
  if(name==='kost'){await loadKostRemoteRange(7);renderKost();}
}

// ── AUTO SELECT DAY BASED ON WEEKDAY ─────────────────────────
// 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
// Program: Man=0, Tir=1, Tor=2, Fre=3, Lør=4
// Ons+Søn = hviledag → vis næste træningsdag
function autoSelectDay(){
  const jsDay=new Date().getDay();
  const map={1:0,2:1,4:2,5:3,6:4}; // JS weekday → DAYS index
  if(map[jsDay]!==undefined){
    curDay=map[jsDay];
  } else {
    // Hviledag: onsdag(3)→ næste er torsdag(2), søndag(0)→ næste er mandag(0)
    curDay=jsDay===3?2:0;
  }
}

// ── STARTUP ───────────────────────────────────────────────────

// ── KOST ──────────────────────────────────────────────────────
const TARGET_KCAL=2520,TARGET_PROT=180,TARGET_KH=260,TARGET_FAT=84;
const BODY_WEIGHT=93;
let curKostDate=todayISO();

function kostKey(date){return'kost_'+date;}
function loadKost(date){const r=localStorage.getItem(kostKey(date));return r?JSON.parse(r):{kcal:'',prot:'',kh:'',fat:'',burned:''};} 
function saveKostLocal(date,data){localStorage.setItem(kostKey(date),JSON.stringify(data));}

async function saveKostRemote(date,data){
  setSync('');
  try{
    await sb('kost_log','POST',{date,kcal:data.kcal?+data.kcal:null,prot:data.prot?+data.prot:null,kh:data.kh?+data.kh:null,fat:data.fat?+data.fat:null,burned:data.burned?+data.burned:null});
    setSync('ok');
  }catch(e){setSync('err');}
}

async function loadKostRemoteRange(days){
  try{
    const dates=[];
    for(let i=0;i<days;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().split('T')[0]);}
    const rows=await sb('kost_log','GET',null,'date=in.('+dates.join(',')+')'+'&order=date.desc');
    if(rows&&rows.length){
      rows.forEach(r=>{
        const d={kcal:r.kcal,prot:r.prot,kh:r.kh,fat:r.fat,burned:r.burned};
        localStorage.setItem(kostKey(r.date),JSON.stringify(d));
      });
    }
  }catch(e){}
}

function kostDayLabel(iso){
  const days=['S\u00f8n','Man','Tir','Ons','Tor','Fre','L\u00f8r'];
  const d=new Date(iso);return days[d.getDay()]+' '+iso.split('-').slice(1).join('/');}

function ring(pct,color,val,unit,label,sub){
  const r=34,circ=2*Math.PI*r,dash=Math.min(pct,1)*circ;
  return '<div class="kost-ring-card">'+
    '<div class="ring-wrap">'+
    '<svg width="80" height="80" viewBox="0 0 80 80">'+
    '<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="7"/>'+
    '<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="7"'+
    ' stroke-dasharray="'+dash+' '+circ+'" stroke-linecap="round"/>'+
    '</svg>'+
    '<div class="ring-center"><span class="ring-val">'+val+'</span><span class="ring-unit">'+unit+'</span></div>'+
    '</div>'+
    '<span class="ring-label">'+label+'</span>'+
    '<span class="ring-sub">'+sub+'</span>'+
    '</div>';}

function renderKost(){
  const data=loadKost(curKostDate);
  const kcal=+data.kcal||0,prot=+data.prot||0,kh=+data.kh||0,fat=+data.fat||0,burned=+data.burned||0;
  const net=kcal-burned;
  const balance=net-TARGET_KCAL;
  const protTarget=Math.round(BODY_WEIGHT*2);
  const isDeficit=balance<0,isSurplus=balance>0;
  const balClass=isDeficit?'deficit':isSurplus?'surplus':'neutral';
  const balSign=balance>0?'+':'';

  // Protein status
  const protPct=protTarget>0?Math.round(prot/protTarget*100):0;
  const protOk=prot>=protTarget;
  const protClass=protOk?'deficit':'surplus'; // green if ok, red if not
  const protText=protOk?'Proteinm\u00e5l n\u00e5et \u2713':'Proteinm\u00e5l ikke n\u00e5et';

  // Kalorie status text
  const balText=isDeficit?'Kalorieunderskud \u2713 — fedttab p\u00e5 rette spor':
    isSurplus?'Kalorieoverskud — overstiger m\u00e5l':'Balanceret — p\u00e5 vedligeholdelse';

  const weekRows=[];
  let weekTotalKcal=0,weekTotalProt=0,weekTotalBalance=0,weekDays=0;
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const iso=d.toISOString().split('T')[0];
    const wd=loadKost(iso);
    if(!wd.kcal)continue;
    const wkcal=+wd.kcal||0;
    const wburned=+wd.burned||0;
    const wprot=+wd.prot||0;
    const wnet=wkcal-wburned;
    const wbal=wnet-TARGET_KCAL;
    const wbalClass=wbal<0?'def':'sur';
    const wbalSign=wbal>0?'+':'';
    weekTotalKcal+=wkcal;
    weekTotalProt+=wprot;
    weekTotalBalance+=wbal;
    weekDays++;
    weekRows.push('<div class="week-kost-row">'+
      '<span class="wkr-day">'+kostDayLabel(iso).split(' ')[0]+'</span>'+
      '<div class="wkr-vals">'+
      '<span class="wkr-kcal">'+wkcal+' kcal</span>'+
      '<span class="wkr-bal '+wbalClass+'">'+wbalSign+wbal+'</span>'+
      '<span class="wkr-prot">'+wprot+'g</span>'+
      '</div></div>');
  }

  let h='<div class="section-title">Kostlog</div>'+
    '<div class="section-sub">M\u00e5l: '+TARGET_KCAL+' kcal \u00b7 '+protTarget+'g protein \u00b7 '+TARGET_KH+'g kh \u00b7 '+TARGET_FAT+'g fedt</div>'+
    '<div class="kost-date-nav">'+
    '<button class="icon-btn" onclick="kostChangeDay(-1)">\u25c4</button>'+
    '<span class="kost-date-label">'+kostDayLabel(curKostDate)+'</span>'+
    '<button class="icon-btn" onclick="kostChangeDay(1)">\u25ba</button>'+
    '</div>';

  // Always show status cards
  h+='<div class="balance-card '+balClass+'">'+
    '<div>'+
    '<div class="balance-label '+balClass+'">'+balText+'</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-top:2px;">Indtag: '+kcal+' kcal \u00b7 Forbr\u00e6ndt: '+burned+' \u00b7 Netto: '+net+'</div>'+
    '</div>'+
    '<div class="balance-val '+balClass+'">'+balSign+balance+'</div>'+
    '</div>';

  h+='<div class="balance-card '+protClass+'" style="margin-bottom:14px;">'+
    '<div>'+
    '<div class="balance-label '+protClass+'">'+protText+'</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-top:2px;">'+prot+'g af '+protTarget+'g ('+protPct+'%)</div>'+
    '</div>'+
    '<div class="balance-val '+protClass+'">'+prot+'g</div>'+
    '</div>';

  // Rings only when data entered
  if(kcal>0||prot>0){
    h+='<div class="kost-rings">'+
      ring(kcal/TARGET_KCAL,'#378add',kcal,'kcal','Kalorier','m\u00e5l '+TARGET_KCAL)+
      ring(prot/protTarget,'#1d9e75',prot,'g','Protein','m\u00e5l '+protTarget+'g')+
      ring(kh/TARGET_KH,'#f0a830',kh,'g','Kulhydrat','m\u00e5l '+TARGET_KH+'g')+
      ring(fat/TARGET_FAT,'#d85a30',fat,'g','Fedt','m\u00e5l '+TARGET_FAT+'g')+
      '</div>';
  }

  h+='<div class="kost-input-card">'+
    '<div class="kost-input-head">Indtast for '+kostDayLabel(curKostDate)+'</div>'+
    '<div class="kost-grid">'+
    '<div class="kost-field"><div class="kost-field-label">Kalorier (kcal)</div><input type="number" inputmode="numeric" id="kKcal" value="'+(data.kcal||'')+'" placeholder="0"></div>'+
    '<div class="kost-field"><div class="kost-field-label">Protein (g)</div><input type="number" inputmode="numeric" id="kProt" value="'+(data.prot||'')+'" placeholder="0"></div>'+
    '<div class="kost-field"><div class="kost-field-label">Kulhydrat (g)</div><input type="number" inputmode="numeric" id="kKh" value="'+(data.kh||'')+'" placeholder="0"></div>'+
    '<div class="kost-field"><div class="kost-field-label">Fedt (g)</div><input type="number" inputmode="numeric" id="kFat" value="'+(data.fat||'')+'" placeholder="0"></div>'+
    '<div class="kost-field" style="grid-column:1/-1;border-bottom:none;">'+
    '<div class="kost-field-label">Forbr\u00e6ndt (kcal fra tr\u00e6ning/cardio)</div>'+
    '<input type="number" inputmode="numeric" id="kBurned" value="'+(data.burned||'')+'" placeholder="0"></div>'+
    '</div></div>'+
    '<button class="kost-save-btn" onclick="saveKostEntry()">Gem</button>'+
    '<button onclick="resetKostEntry()" style="width:100%;padding:11px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-bottom:14px;">Nulstil dag</button>';

  if(weekRows.length>0){
    const avgKcal=Math.round(weekTotalKcal/weekDays);
    const avgProt=Math.round(weekTotalProt/weekDays);
    const totBalSign=weekTotalBalance>0?'+':'';
    const totBalClass=weekTotalBalance<0?'def':'sur';
    const protTarget2=Math.round(BODY_WEIGHT*2);
    const avgProtOk=avgProt>=protTarget2;

    h+='<div class="week-kost-card"><div class="week-kost-head">Sidste 7 dage</div>'+weekRows.join('')+'</div>';

    h+='<div class="week-kost-card" style="margin-top:0;">'+
      '<div class="week-kost-head">Ugeoversigt ('+weekDays+' dage logget)</div>'+
      '<div class="week-kost-row" style="background:var(--input-bg);">'+
        '<span class="wkr-day" style="width:auto;color:var(--muted);font-size:12px;">Total kcal</span>'+
        '<div class="wkr-vals"><span class="wkr-kcal">'+weekTotalKcal+' kcal</span>'+
        '<span style="font-size:11px;color:var(--muted);">gns '+avgKcal+'/dag</span></div>'+
      '</div>'+
      '<div class="week-kost-row" style="background:var(--input-bg);">'+
        '<span class="wkr-day" style="width:auto;color:var(--muted);font-size:12px;">Samlet balance</span>'+
        '<div class="wkr-vals">'+
        '<span class="wkr-bal '+totBalClass+'" style="font-size:14px;font-weight:700;">'+totBalSign+weekTotalBalance+' kcal</span>'+
        '<span style="font-size:11px;color:var(--muted);">'+(weekTotalBalance<0?'underskud ✓':'overskud')+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="week-kost-row" style="background:var(--input-bg);border-bottom:none;">'+
        '<span class="wkr-day" style="width:auto;color:var(--muted);font-size:12px;">Gns protein</span>'+
        '<div class="wkr-vals">'+
        '<span class="wkr-kcal">'+avgProt+'g/dag</span>'+
        '<span class="wkr-bal '+(avgProtOk?'def':'sur')+'">'+(avgProtOk?'mål nået ✓':'under mål')+'</span>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  document.getElementById('kost-screen').innerHTML=h;
}

function kostChangeDay(dir){
  const d=new Date(curKostDate);d.setDate(d.getDate()+dir);
  const newDate=d.toISOString().split('T')[0];
  // Allow up to tomorrow (so Sunday is accessible on Saturday)
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowISO=tomorrow.toISOString().split('T')[0];
  if(newDate>tomorrowISO)return;
  curKostDate=newDate;renderKost();
}

function resetKostEntry(){
  if(!confirm('Nulstil kostdata for ' + kostDayLabel(curKostDate) + '?'))return;
  localStorage.removeItem(kostKey(curKostDate));
  renderKost();
}

async function saveKostEntry(){
  const data={
    kcal:document.getElementById('kKcal').value,
    prot:document.getElementById('kProt').value,
    kh:document.getElementById('kKh').value,
    fat:document.getElementById('kFat').value,
    burned:document.getElementById('kBurned').value
  };
  saveKostLocal(curKostDate,data);
  await saveKostRemote(curKostDate,data);
  renderKost();
}

async function autoSelectWeek(){
  for(let w=1;w<=8;w++){
    await preloadWeek(w);
    const allDone=DAYS.every(d=>{const data=wcGet(w,d.id);return data&&data.finished;});
    if(!allDone){curWeek=w;return;}
  }
  curWeek=8;
}

async function init(){
  autoSelectDay();
  document.getElementById('log-screen').innerHTML='<div class="loading"><div class="spinner"></div>Henter data...</div>';
  await autoSelectWeek();
  renderTabs();
  renderLog();
}

init();
</script>
